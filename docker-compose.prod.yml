services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3007
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3007"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3007/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ./app
    restart: unless-stopped
    environment:
      APP_API_BASE_URL: ${APP_API_BASE_URL:-/api}
      APP_SOCKET_URL: ${APP_SOCKET_URL:-}
      APP_GOOGLE_MAPS_API_KEY: ${APP_GOOGLE_MAPS_API_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
