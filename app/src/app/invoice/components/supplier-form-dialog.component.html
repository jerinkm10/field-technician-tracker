<p-dialog
  [visible]="visible"
  (visibleChange)="visible = $event; !$event && handleHide()"
  [modal]="true"
  [closable]="!saving"
  [dismissableMask]="false"
  [closeOnEscape]="!saving"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: 'min(92vw, 48rem)' }"
  [header]="dialogTitle()"
  (onHide)="visible && handleHide()">
  <div class="supplier-form">
    <div class="field-grid">
      <label class="field">
        <span>Branch Name</span>
        <input pInputText [(ngModel)]="draft.supplierName" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Phone</span>
        <input pInputText [(ngModel)]="draft.phone" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Email</span>
        <input pInputText type="email" [(ngModel)]="draft.email" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>GSTIN</span>
        <input pInputText [(ngModel)]="draft.gstin" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Bank Name</span>
        <input pInputText [(ngModel)]="draft.bankName" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Account Number</span>
        <input pInputText [(ngModel)]="draft.accountNumber" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>IFSC Code</span>
        <input pInputText [(ngModel)]="draft.ifscCode" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Status</span>
        <p-select
          [options]="statusOptions"
          optionLabel="label"
          optionValue="value"
          [(ngModel)]="draft.status"
          [disabled]="isReadOnly()"
          appendTo="body">
        </p-select>
      </label>
    </div>

    <label class="field">
      <span>Address</span>
      <textarea [(ngModel)]="draft.address" rows="4" [disabled]="isReadOnly()"></textarea>
    </label>
  </div>

  <ng-template #footer>
    <div class="dialog-actions">
      <button
        pButton
        type="button"
        [label]="isReadOnly() ? 'Close' : 'Cancel'"
        text
        [disabled]="saving"
        (click)="cancel.emit()">
      </button>

      @if (!isReadOnly()) {
        <button
          pButton
          type="button"
          [label]="saving ? 'Saving...' : primaryActionLabel()"
          icon="pi pi-check"
          [disabled]="saving || !canSubmit()"
          (click)="submit()">
        </button>
      }
    </div>
  </ng-template>
</p-dialog>
