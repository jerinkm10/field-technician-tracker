<p-dialog
  [visible]="visible"
  [modal]="true"
  [closable]="!saving"
  [dismissableMask]="!saving"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: 'min(92vw, 56rem)' }"
  [header]="dialogTitle()"
  (onHide)="handleHide()">
  <div class="customer-form">
    <div class="field-grid">
      <label class="field">
        <span>Customer Name</span>
        <input pInputText [(ngModel)]="draft.customerName" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Phone</span>
        <input pInputText [(ngModel)]="draft.phone" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Email</span>
        <input pInputText type="email" [(ngModel)]="draft.email" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>GSTIN</span>
        <input pInputText [(ngModel)]="draft.gstin" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Place Of Supply</span>
        <input pInputText [(ngModel)]="draft.placeOfSupply" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Status</span>
        <p-select
          [options]="statusOptions"
          optionLabel="label"
          optionValue="value"
          appendTo="body"
          [(ngModel)]="draft.status"
          [disabled]="isReadOnly()">
        </p-select>
      </label>
    </div>

    <div class="field-grid">
      <label class="field">
        <span>Billing Address</span>
        <textarea [(ngModel)]="draft.billingAddress" rows="4" [disabled]="isReadOnly()"></textarea>
      </label>

      <label class="field">
        <span>Shipping Address</span>
        <textarea [(ngModel)]="draft.shippingAddress" rows="4" [disabled]="isReadOnly()"></textarea>
      </label>
    </div>
  </div>

  <ng-template #footer>
    <div class="dialog-actions">
      <button
        pButton
        type="button"
        [label]="isReadOnly() ? 'Close' : 'Cancel'"
        text
        [disabled]="saving"
        (click)="cancel.emit()">
      </button>

      @if (!isReadOnly()) {
        <button
          pButton
          type="button"
          [label]="saving ? 'Saving...' : primaryActionLabel()"
          icon="pi pi-check"
          [disabled]="saving || !canSubmit()"
          (click)="submit()">
        </button>
      }
    </div>
  </ng-template>
</p-dialog>
