<p-dialog
  [visible]="visible"
  [modal]="true"
  [closable]="!saving"
  [dismissableMask]="false"
  [closeOnEscape]="false"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: 'min(92vw, 48rem)' }"
  [header]="dialogTitle()"
  (onHide)="handleHide()">
  <div class="employee-form">
    <div class="field-grid">
      <label class="field">
        <span>Name</span>
        <input pInputText [(ngModel)]="draft.name" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Username</span>
        <input pInputText [(ngModel)]="draft.username" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Phone</span>
        <input pInputText [(ngModel)]="draft.phone" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Email (Optional)</span>
        <input pInputText type="email" [(ngModel)]="draft.email" [disabled]="isReadOnly()" />
      </label>

      <label class="field">
        <span>Role</span>
        <p-select
          [options]="roleOptions"
          optionLabel="label"
          optionValue="value"
          [(ngModel)]="draft.role"
          [disabled]="isReadOnly()"
          appendTo="body">
        </p-select>
      </label>

      <label class="field">
        <span>Status</span>
        <p-select
          [options]="statusOptions"
          optionLabel="label"
          optionValue="value"
          [(ngModel)]="draft.status"
          [disabled]="isReadOnly()"
          appendTo="body">
        </p-select>
      </label>
    </div>

    @if (!isReadOnly()) {
      <label class="field">
        <span>{{ mode === 'edit' ? 'New Password (Optional)' : 'Password' }}</span>
        <input
          pInputText
          type="password"
          [(ngModel)]="draft.password"
          [disabled]="isReadOnly()"
          placeholder="{{ mode === 'edit' ? 'Leave blank to keep current password' : 'Minimum 8 characters' }}" />
        <small class="helper-text">
          {{
            mode === 'edit'
              ? 'Leave the password empty if the employee should keep the current password.'
              : 'Passwords are stored as bcrypt hashes in the backend.'
          }}
        </small>
      </label>
    }
  </div>

  <ng-template #footer>
    <div class="dialog-actions">
      <button
        pButton
        type="button"
        [label]="isReadOnly() ? 'Close' : 'Cancel'"
        text
        [disabled]="saving"
        (click)="cancel.emit()">
      </button>

      @if (!isReadOnly()) {
        <button
          pButton
          type="button"
          [label]="saving ? 'Saving...' : primaryActionLabel()"
          icon="pi pi-check"
          [disabled]="saving || !canSubmit()"
          (click)="submit()">
        </button>
      }
    </div>
  </ng-template>
</p-dialog>
